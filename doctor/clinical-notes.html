<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinical Notes - Health Nest</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/doctor.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">Health Nest<p style="font-size:0.9rem;font-weight:400;margin-top:0.5rem;">Doctor Portal</p></div>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="appointments.html">Appointments</a></li>
      <li><a href="patient-records.html">Patient Records</a></li>
      <li><a href="health-alerts.html">Health Alerts</a></li>
      <li><a href="clinical-notes.html" class="active">Clinical Notes</a></li>
      <li><a href="follow-ups.html">Follow-ups</a></li>
      <li><a href="analytics.html">Analytics</a></li>
      <li><a href="settings.html">Settings</a></li>
    </ul>
    <div class="sidebar-logout"><a href="../login.html" onclick="logout(); return false;">Logout</a></div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Clinical Notes</h1>
      <p class="page-subtitle">Capture consultation notes and review previous entries</p>
    </div>

    <section class="doctor-grid-2">
      <article class="panel-card">
        <h2 class="panel-title">Add Consultation Note</h2>
        <div id="clinicalNotesMsg" class="alert hidden"></div>
        <form id="clinicalNoteForm" class="settings-form">
          <div class="form-group">
            <label class="form-label">Select Patient</label>
            <select id="clinicalPatientSelect" class="form-select">
              <option value="Rohan Verma">Rohan Verma</option>
              <option value="Priya Nair">Priya Nair</option>
              <option value="Aditi Sharma">Aditi Sharma</option>
              <option value="Manoj Kulkarni">Manoj Kulkarni</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">Consultation Notes</label>
            <textarea id="clinicalNoteText" class="form-textarea note-textarea" placeholder="Enter diagnosis, treatment plan, and follow-up advice..."></textarea>
          </div>
          <div class="settings-actions">
            <button type="submit" class="btn btn-primary">Save Note</button>
          </div>
        </form>
      </article>

      <article class="panel-card">
        <h2 class="panel-title">Previous Notes</h2>
        <div id="clinicalNotesHistory" class="notes-history"></div>
      </article>
    </section>
  </main>

  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/doctor.js"></script>
  <script>
    protectRoute('doctor');
    displayUserName();

    (function () {
      const STORAGE_KEY = 'hn_doctor_clinical_notes';
      const clinicalNoteForm = document.getElementById('clinicalNoteForm');
      const clinicalPatientSelect = document.getElementById('clinicalPatientSelect');
      const clinicalNoteText = document.getElementById('clinicalNoteText');
      const clinicalNotesMsg = document.getElementById('clinicalNotesMsg');
      const clinicalNotesHistory = document.getElementById('clinicalNotesHistory');

      const demoNotes = [
        { patient: 'Rohan Verma', text: 'BP elevated. Reinforced low-sodium diet and medication adherence.', time: '02 Mar 2026, 09:50 AM' },
        { patient: 'Priya Nair', text: 'Mild wheeze. Continue inhaler BID and trigger avoidance counseling.', time: '01 Mar 2026, 11:10 AM' },
        { patient: 'Aditi Sharma', text: 'Follow-up stable. Continue antihypertensives, recheck after 2 weeks.', time: '28 Feb 2026, 04:40 PM' }
      ];

      function loadNotes() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return demoNotes;
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) && parsed.length ? parsed : demoNotes;
        } catch (_err) {
          return demoNotes;
        }
      }

      function saveNotes(notes) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
      }

      function showMessage(type, text) {
        clinicalNotesMsg.className = type === 'error' ? 'alert alert-error' : 'alert alert-success';
        clinicalNotesMsg.textContent = text;
      }

      function renderNotes(notes) {
        clinicalNotesHistory.innerHTML = '';
        notes.forEach((note) => {
          const noteItem = document.createElement('article');
          noteItem.className = 'history-note';
          noteItem.innerHTML = `<p class="history-note-meta"><strong>${note.patient}</strong> · ${note.time}</p><p class="history-note-text">${note.text}</p>`;
          clinicalNotesHistory.appendChild(noteItem);
        });
      }

      let notes = loadNotes();
      renderNotes(notes);

      clinicalNoteForm.addEventListener('submit', function (event) {
        event.preventDefault();
        const patient = clinicalPatientSelect.value;
        const text = clinicalNoteText.value.trim();

        if (!text) {
          showMessage('error', 'Please add consultation notes before saving.');
          return;
        }

        const now = new Date();
        const note = {
          patient,
          text,
          time: now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) + ', ' +
            now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
        };

        notes = [note, ...notes];
        saveNotes(notes);
        renderNotes(notes);
        clinicalNoteText.value = '';
        showMessage('success', `Clinical note saved for ${patient}.`);
      });
    })();
  </script>
</body>
</html>
